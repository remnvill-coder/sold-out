<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 15px;
    background: #f4f6f8;
}

h2 { font-size: 22px; }

#reader {
    width: 100%;
    max-width: 350px;
    margin: auto;
}

button {
    padding: 14px;
    font-size: 16px;
    margin-top: 10px;
    width: 90%;
    background: #1976d2;
    color: white;
    border: none;
    border-radius: 8px;
}

button:disabled { background: gray; }

#result, #searchResult {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>SCAN ITEM QR</h2>

<div id="reader"></div>

<input id="siNo" placeholder="Enter SI No"
style="padding:12px;width:85%;font-size:16px;margin-top:5px;">

<button onclick="startScan()">START SCAN</button>
<button onclick="searchSI()">SEARCH SI NO</button>
<button onclick="refreshPage()" style="background:#ff9800;">REFRESH</button>

<p id="result">Ready</p>
<div id="searchResult"></div>

<script>

let scanner = null;
let isScanning = false;

const API_URL = "https://script.google.com/macros/s/AKfycbyE6rAFE7Q1f3wkAEnNdiI17pW51CQLsM6TtHXzSU5Nk6t5QadWmA9ZXkUOPciXerG5/exec";


// =========================
// START SCAN (FIXED CAMERA)
// =========================
async function startScan() {

    const siNo = document.getElementById("siNo").value.trim();
    const result = document.getElementById("result");

    if (!siNo) {
        result.innerHTML = "⚠ Enter SI No";
        return;
    }

    if (scanner) {
        try {
            await scanner.stop();
            await scanner.clear();
        } catch (e) {}
        scanner = null;
    }

    try {

        const devices = await Html5Qrcode.getCameras();

        if (!devices.length) {
            result.innerHTML = "No camera found ❌";
            return;
        }

        let cameraId = null;

        // ✅ FIND BACK CAMERA
        for (let device of devices) {
            const label = (device.label || "").toLowerCase();

            if (
                label.includes("back") ||
                label.includes("rear") ||
                label.includes("environment")
            ) {
                cameraId = device.id;
                break;
            }
        }

        // ✅ FALLBACK CAMERA
        if (!cameraId) {
            cameraId = devices[devices.length - 1].id;
        }

        scanner = new Html5Qrcode("reader");

        await scanner.start(
            cameraId,
            { fps: 10, qrbox: 250 },

            async (code) => {

                if (isScanning) return;
                isScanning = true;

                result.innerHTML = "Processing...";

                const res = await fetch(
                    API_URL + "?barcode=" + code + "&siNo=" + siNo
                );

                const data = await res.json();

                let lens = data.colJ;
                let desc = data.colO;

                let details = "";

                if (lens && lens.trim() !== "") {
                    details = `Lens: ${lens}<br>Description: ${desc}`;
                } else {
                    details = `Description: ${desc}`;
                }

                let time = data.timestamp
                    ? new Date(data.timestamp).toLocaleString()
                    : "";

                if (data.status === "DUPLICATE") {
                    result.innerHTML =
                        `⚠ DUPLICATE<br>${details}<br>SI: ${data.siNo}<br>${time}`;
                }
                else if (data.status === "FOUND") {
                    result.innerHTML =
                        `✅ SCANNED<br>${details}<br>${time}`;
                }
                else {
                    result.innerHTML = "❌ NOT FOUND";
                }

                isScanning = false;
            }
        );

    } catch (err) {
        result.innerHTML = "Camera error ❌";
    }
}


// =========================
// SEARCH SI NO
// =========================
async function searchSI() {

    const siNo = document.getElementById("siNo").value;
    const out = document.getElementById("searchResult");

    if (!siNo) {
        out.innerHTML = "⚠ Enter SI No";
        return;
    }

    out.innerHTML = "Searching...";

    const res = await fetch(API_URL + "?action=searchSI&siNo=" + siNo);
    const data = await res.json();

    if (!data.items.length) {
        out.innerHTML = "No results found";
        return;
    }

    let html = `<b>SI:</b> ${siNo}<br><br>`;

    data.items.forEach((i, index) => {

        let lens = i.lens;
        let desc = i.grade;

        html += `
        <div style="border:1px solid #ccc;padding:10px;margin:5px;">
            <b>#${index + 1}</b><br>
            ${lens ? "Lens: " + lens + "<br>" : ""}
            Description: ${desc}<br>
            Barcode: ${i.barcode}
        </div>`;
    });

    out.innerHTML = html;
}


// =========================
// REFRESH
// =========================
function refreshPage() {

    document.getElementById("siNo").value = "";
    document.getElementById("result").innerHTML = "Ready";
    document.getElementById("searchResult").innerHTML = "";

    isScanning = false;

    if (scanner) {
        try {
            scanner.stop();
            scanner.clear();
        } catch (e) {}
        scanner = null;
    }
}

</script>

</body>
</html>
