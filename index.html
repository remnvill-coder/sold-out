<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCAN ITEM SYSTEM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#eef2f7}
.header{display:flex;justify-content:center;align-items:center;gap:10px;padding:12px;background:#1976d2;color:#fff;position:sticky;top:0}
.container{padding:15px;max-width:500px;margin:auto}
#reader{width:100%;border-radius:15px;overflow:hidden}
input,button{width:100%;padding:14px;margin-top:10px;border-radius:12px;border:none;font-size:16px}
button{font-weight:bold;cursor:pointer}
.btn-blue{background:#1976d2;color:#fff}
.btn-orange{background:#ff5722;color:#fff}
.card{background:#fff;padding:15px;border-radius:15px;margin-top:10px}
.green{border-left:6px solid #2ecc71}
.red{border-left:6px solid #e74c3c}
.blue{border-left:6px solid #2196f3}
</style>

</head>

<body>

<div class="header">
  <h3>SCAN ITEM SYSTEM</h3>
</div>

<div class="container">

<div id="reader"></div>

<input id="siNo" placeholder="Enter SI No">

<button class="btn-blue" onclick="startScan()">START SCAN</button>
<button class="btn-blue" onclick="searchSI()">SEARCH SI</button>
<button class="btn-orange" onclick="refreshPage()">REFRESH</button>

<div id="result">
  <div class="card blue">Ready</div>
</div>

<div id="searchResult"></div>

</div>

<script>

let scanner=null;
let isScanning=false;
let isSaving=false;
let tempCode="";
let tempSi="";

const API_URL="https://script.google.com/macros/s/AKfycbztOWU2ESBt7CB9h3dx26oOrO_awXxT9iJzjNkroakrWfK6GG4z6FcYjdN-aHFotrczLg/exec";

function clearUI(){
  document.getElementById("result").innerHTML='<div class="card blue">Ready</div>';
  document.getElementById("searchResult").innerHTML="";
}

async function startScan(){

clearUI();

const siNo=document.getElementById("siNo").value;
if(!siNo){alert("Enter SI No");return;}

const devices=await Html5Qrcode.getCameras();
if(!devices.length){alert("No camera");return;}

let cameraId=devices[0].id;

scanner=new Html5Qrcode("reader");

await scanner.start(cameraId,{fps:10,qrbox:250},async(code)=>{

if(isScanning)return;
isScanning=true;

await scanner.stop();
await scanner.clear();
scanner=null;

tempCode=code;
tempSi=siNo;

const res=await fetch(API_URL+"?action=check&barcode="+encodeURIComponent(code));
const data=await res.json();

const row=data.row||[];
const colJ=data.colJ||row[9]||"";
const colO=data.colO||row[14]||"";

if(data.status==="FOUND"){

document.getElementById("result").innerHTML=`
<div class="card green">
<h3>AVAILABLE</h3>
<b>${colO}</b><br>
<small>${colJ}</small><br>
<button onclick="saveYes()" class="btn-blue">ADD TO SOLD</button>
<button onclick="cancel()" class="btn-orange">CANCEL</button>
</div>`;

}
else if(data.status==="DUPLICATE"){

document.getElementById("result").innerHTML=`
<div class="card red">
<h3>ALREADY SOLD</h3>
<b>${colO}</b><br>
<small>${colJ}</small>
</div>`;

}
else{

document.getElementById("result").innerHTML=`
<div class="card red">
<h3>NOT FOUND</h3>
<b>${colO}</b><br>
<small>${colJ}</small>
</div>`;
}

isScanning=false;

});
}

async function saveYes(){

if(isSaving)return;
isSaving=true;

const res=await fetch(API_URL+"?action=save&barcode="+encodeURIComponent(tempCode)+"&siNo="+encodeURIComponent(tempSi));
const data=await res.json();

document.getElementById("result").innerHTML=`
<div class="card green">
<h3>${data.status}</h3>
</div>`;

isSaving=false;
}

function cancel(){
document.getElementById("result").innerHTML='<div class="card red">CANCELLED</div>';
}

async function searchSI(){

clearUI();

const si=document.getElementById("siNo").value;

const res=await fetch(API_URL+"?action=searchSI&siNo="+encodeURIComponent(si));
const data=await res.json();

if(!data.items.length){
document.getElementById("searchResult").innerHTML="No results";
return;
}

document.getElementById("searchResult").innerHTML=
data.items.map((i,idx)=>`
<div class="card">
<b>#${idx+1}</b><br>
<b>${i.colO}</b><br>
<small>${i.colJ}</small><br>
${i.barcode}
</div>
`).join("");

}

function refreshPage(){
document.getElementById("siNo").value="";
clearUI();
}

</script>

</body>
</html>
