<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #eef2f7;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px;
  background: linear-gradient(135deg, #2196f3, #1976d2);
  color: white;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.header img {
  width: 40px;
  height: 40px;
  background: white;
  border-radius: 8px;
  padding: 3px;
}

.container { padding: 15px; }

#reader {
  width: 100%;
  max-width: 360px;
  margin: auto;
  border-radius: 15px;
  overflow: hidden;
}

input {
  padding: 14px;
  width: 100%;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  margin-top: 12px;
}

button {
  padding: 14px;
  width: 100%;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
}

button:hover { transform: translateY(-3px); }

.btn-blue { background: linear-gradient(135deg,#2196f3,#1976d2); color:white; }
.btn-orange { background: linear-gradient(135deg,#ff7043,#ff5722); color:white; }

.card {
  padding: 15px;
  border-radius: 15px;
  margin-top: 12px;
  background: white;
}

.green { border-left: 6px solid #2ecc71; }
.red { border-left: 6px solid #e74c3c; }

.saving {
  border-left: 6px solid #2196f3;
  text-align: center;
  padding: 25px;
  background: #e3f2fd;
  color: #1976d2;
}

.spinner {
  width: 35px;
  height: 35px;
  margin: auto;
  border: 4px solid #cfe8ff;
  border-top: 4px solid #2196f3;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.no-results {
  text-align: center;
  padding: 20px;
  margin-top: 15px;
  background: white;
  border-radius: 12px;
  color: #666;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;
background:#eef2f7;display:flex;align-items:center;justify-content:center;flex-direction:column;">

<h2>🔐 SYSTEM LOGIN</h2>
<input id="password" type="password" placeholder="Enter Password" style="padding:14px;width:80%;max-width:300px;">
<button class="btn-blue" onclick="login()">LOGIN</button>
<p id="loginStatus"></p>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="header">
  <img src="https://drive.google.com/thumbnail?id=1U9kmQ7qummOCpVppdLtmVaugMuzLYUWQ&sz=w200">
  <h3>GAISANO ILOILO BRANCH</h3>
</div>

<div class="container">

<div id="reader" style="display:none;"></div>

<input id="siNo" placeholder="Enter SI No">

<button id="scanBtn" class="btn-blue" onclick="toggleScan()">📷 START SCAN</button>
<button class="btn-blue" onclick="searchSI()">🔍 SEARCH SI</button>
<button class="btn-orange" onclick="refreshPage()">♻ REFRESH</button>

<!-- PHOTO UPLOAD -->
<input id="photoInput" type="file" accept="image/*" multiple style="display:none">

<button class="btn-blue" onclick="document.getElementById('photoInput').click()">
📷 UPLOAD 2 PHOTOS
</button>

<button class="btn-orange" onclick="uploadPhotos()">
⬆ SEND PHOTOS
</button>

<div id="photoPreview" style="display:flex;gap:10px;margin-top:10px;"></div>

<p id="result"></p>
<div id="searchResult"></div>

</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbz15q6pYrwYH4T8A3aLgF0N1ne0gbY8HH5bX0oadC2iV8Luseef3-yk4V0WH1QqpalyHQ/exec";

let scanner=null, isScanning=false, isSaving=false;
let tempCode="", tempSi="";

/* LOGIN */
async function login(){
const pass=document.getElementById("password").value;
const res=await fetch(API_URL+"?action=login&password="+pass);
const data=await res.json();
if(data.status==="OK"){
document.getElementById("loginScreen").style.display="none";
document.getElementById("app").style.display="block";
}else document.getElementById("loginStatus").innerText="❌ Wrong";
}

/* SCAN */
async function toggleScan(){
const siNo=document.getElementById("siNo").value;
if(!siNo)return alert("Enter SI No");

if(isScanning){
isScanning=false;
await scanner.stop();
scanner=null;
return;
}

isScanning=true;
document.getElementById("reader").style.display="block";

scanner=new Html5Qrcode("reader");

const cams=await Html5Qrcode.getCameras();
let cam=cams[0].id;

await scanner.start(cam,{fps:10,qrbox:250},async code=>{
if(!isScanning)return;
isScanning=false;
await scanner.stop();
scanner=null;

tempCode=code;
tempSi=siNo;

const res=await fetch(API_URL+"?action=check&barcode="+code);
const data=await res.json();

document.getElementById("result").innerHTML=`
<div class="card green">
✔ FOUND<br><b>${code}</b>
<button class="btn-blue" onclick="saveYes()">ADD TO SOLD</button>
</div>`;
});
}

/* SAVE */
async function saveYes(){
isSaving=true;
const res=await fetch(API_URL+"?action=save&barcode="+tempCode+"&siNo="+tempSi);
const data=await res.json();
document.getElementById("result").innerHTML=`
<div class="card green">✔ ${data.status}</div>`;
isSaving=false;
}

/* SEARCH */
async function searchSI(){
const siNo=document.getElementById("siNo").value;
const res=await fetch(API_URL+"?action=searchSI&siNo="+siNo);
const data=await res.json();

document.getElementById("searchResult").innerHTML=
data.items?.length?
data.items.map(i=>`<div class="card">${i.barcode}</div>`).join("")
:`<div class="no-results">No results</div>`;
}

/* UTIL */
function refreshPage(){
document.getElementById("siNo").value="";
document.getElementById("result").innerHTML="";
document.getElementById("searchResult").innerHTML="";
}

/* PHOTO UPLOAD FIXED */
let selectedFiles=[];

document.addEventListener("DOMContentLoaded",()=>{
const photoInput=document.getElementById("photoInput");

photoInput.addEventListener("change",function(){
selectedFiles=Array.from(this.files).slice(0,2);

const preview=document.getElementById("photoPreview");
preview.innerHTML="";

selectedFiles.forEach(f=>{
const img=document.createElement("img");
img.src=URL.createObjectURL(f);
img.style.width="100px";
img.style.borderRadius="10px";
preview.appendChild(img);
});
});
});

async function uploadPhotos(){
if(selectedFiles.length!==2){
alert("Select 2 photos");
return;
}

const form=new FormData();
selectedFiles.forEach((f,i)=>form.append("photo"+(i+1),f));
form.append("action","uploadPhotos");

document.getElementById("result").innerHTML=
`<div class="card saving"><div class="spinner"></div>Uploading...</div>`;

const res=await fetch(API_URL,{method:"POST",body:form});
const data=await res.json();

document.getElementById("result").innerHTML=
`<div class="card green">✔ Upload Success</div>`;
}

</script>
</body>
</html>
