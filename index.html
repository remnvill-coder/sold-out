<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 15px;
    background: #f4f6f8;
}

#reader {
    width: 100%;
    max-width: 350px;
    margin: auto;
}

input {
    padding: 12px;
    width: 85%;
    border-radius: 10px;
}

button {
    padding: 14px;
    width: 90%;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
}

.btn-blue { background: #1976d2; color: white; }
.btn-orange { background: #ff9800; color: white; }

.card {
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
}

.green { background: #d4f8d4; border: 2px solid green; }
.red { background: #ffd6d6; border: 2px solid red; }
</style>
</head>

<body>

<h2>📦 SCAN SYSTEM</h2>

<div id="reader"></div>

<input id="siNo" placeholder="Enter SI No">

<button class="btn-blue" onclick="startScan()">START SCAN</button>
<button class="btn-blue" onclick="searchSI()">SEARCH SI</button>
<button class="btn-orange" onclick="refreshPage()">REFRESH</button>

<p id="result">Ready</p>
<div id="searchResult"></div>

<script>

let scanner = null;
let isScanning = false;

const API_URL = "https://script.google.com/macros/s/AKfycbzpzYDY-NyuUCCivZkbRUM-shcNeF9_0qXNJtuqnrNJVFmJiYz5oxubpHyltibi9xpVzQ/exec";


// ================= SCAN =================
async function startScan() {

    const siNo = document.getElementById("siNo").value.trim();

    if (!siNo) {
        document.getElementById("result").innerHTML = "⚠ Enter SI No";
        return;
    }

    document.getElementById("searchResult").innerHTML = "";

    if (scanner) {
        try { await scanner.stop(); await scanner.clear(); } catch(e){}
        scanner = null;
    }

    const devices = await Html5Qrcode.getCameras();
    const cameraId = devices[devices.length - 1].id;

    scanner = new Html5Qrcode("reader");

    await scanner.start(cameraId, { fps: 10, qrbox: 250 },

    async (code) => {

        if (isScanning) return;
        isScanning = true;

        await scanner.stop();
        await scanner.clear();
        scanner = null;

        const res = await fetch(API_URL +
            "?barcode=" + encodeURIComponent(code) +
            "&siNo=" + encodeURIComponent(siNo));

        const data = await res.json();

        let colM = data.colM || "";
        let colJ = data.colJ || "";
        let colO = data.colO || "";

        let details =
            `<b>Tag No:</b> ${colM}<br>` +
            (colJ ? `<b>Lens:</b> ${colJ}<br>` : "") +
            `<b>Description:</b> ${colO}`;

        if (data.status === "FOUND") {

            document.getElementById("result").innerHTML =
                `<div class="card green">✅ FOUND<br><br>${details}</div>`;
        }

        else if (data.status === "DUPLICATE") {

            document.getElementById("result").innerHTML =
                `<div class="card red">⚠ DUPLICATE<br><br>${details}</div>`;
        }

        else {
            document.getElementById("result").innerHTML = "❌ NOT FOUND";
        }

        isScanning = false;
    });

}


// ================= SEARCH =================
async function searchSI() {

    const siNo = document.getElementById("siNo").value.trim();
    const out = document.getElementById("searchResult");

    document.getElementById("result").innerHTML = "Ready";

    if (!siNo) {
        out.innerHTML = "⚠ Enter SI No";
        return;
    }

    const res = await fetch(API_URL + "?action=searchSI&siNo=" + encodeURIComponent(siNo));
    const data = await res.json();

    if (!data.items || data.items.length === 0) {
        out.innerHTML = "❌ No results";
        return;
    }

    let html = "";

    data.items.forEach((i, index) => {

        html += `
        <div class="card">
            #${index+1}<br>
            <b>Tag No:</b> ${i.colM || "N/A"}<br>
            ${i.colJ ? `<b>Lens:</b> ${i.colJ}<br>` : ""}
            <b>Description:</b> ${i.colO || "N/A"}<br>
            ${i.barcode}
        </div>`;
    });

    out.innerHTML = html;
}


// ================= REFRESH =================
function refreshPage() {

    document.getElementById("siNo").value = "";
    document.getElementById("result").innerHTML = "Ready";
    document.getElementById("searchResult").innerHTML = "";

    if (scanner) {
        scanner.stop();
        scanner.clear();
        scanner = null;
    }
}

</script>

</body>
</html>
