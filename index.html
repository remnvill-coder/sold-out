<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body { font-family: Arial; margin: 0; background: #eef2f7; }

.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px;
  background: linear-gradient(135deg, #2196f3, #1976d2);
  color: white;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.header img {
  width: 40px;
  height: 40px;
  background: white;
  border-radius: 8px;
  padding: 3px;
}

.container { padding: 15px; }

#reader {
  width: 100%;
  max-width: 360px;
  margin: auto;
  border-radius: 15px;
  overflow: hidden;
  display: none;
}

input {
  padding: 14px;
  width: 100%;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  margin-top: 12px;
}

button {
  padding: 14px;
  width: 100%;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
  cursor: pointer;
}

.btn-blue { background: #2196f3; color: white; }
.btn-orange { background: #ff5722; color: white; }

.card { padding: 15px; border-radius: 15px; margin-top: 12px; background: white; }
.green { border-left: 6px solid #2ecc71; }
.red { border-left: 6px solid #e74c3c; }

.no-results {
  text-align: center;
  margin-top: 20px;
  padding: 20px;
  font-weight: bold;
  color: #666;
  background: white;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://drive.google.com/thumbnail?id=1U9kmQ7qummOCpVppdLtmVaugMuzLYUWQ&sz=w200">
  <h3>GAISANO ILOILO BRANCH</h3>
</div>

<div class="container">

  <div id="reader"></div>

  <input id="siNo" placeholder="Enter SI No">

  <button class="btn-blue" onclick="toggleScan()">📷 START SCAN</button>
  <button class="btn-blue" onclick="searchSI()">🔍 SEARCH SI</button>
  <button class="btn-orange" onclick="refreshPage()">♻ REFRESH</button>

  <p id="result"></p>
  <div id="searchResult"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwpeyJLOGjzBbhkv7gxdLKgnXOdUYCPG77aFT04EAn24_sdPqzyYPrTZNwULk8ak6B1TQ/exec";

let scanner = null;
let isScanning = false;
let isSaving = false;

let tempCode = "";
let tempSi = "";

/* ================= LOGIN REMOVED (optional) ================= */

/* ================= SAFE CAMERA START ================= */
async function toggleScan() {
  const siNo = document.getElementById("siNo").value;
  if (!siNo) return alert("Enter SI No");

  // STOP SCANNING
  if (isScanning) {
    await stopScanner();
    return;
  }

  clearUI();
  isScanning = true;
  document.getElementById("reader").style.display = "block";

  try {
    const devices = await Html5Qrcode.getCameras();

    if (!devices || devices.length === 0) {
      alert("No camera found");
      isScanning = false;
      return;
    }

    let cameraId = devices[0].id;

    for (let d of devices) {
      if ((d.label || "").toLowerCase().includes("back")) {
        cameraId = d.id;
        break;
      }
    }

    scanner = new Html5Qrcode("reader");

    await scanner.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      async (code) => {

        if (!isScanning) return;

        tempCode = code;
        tempSi = siNo;

        await stopScanner();

        beep();

        const res = await fetch(API_URL + "?action=check&barcode=" + encodeURIComponent(code));
        const data = await res.json();

        let row = data.row || [];
        let colJ = data.colJ || row?.[9] || "";
        let colO = data.colO || row?.[14] || "";

        if (data.status === "FOUND") {
          document.getElementById("result").innerHTML = `
            <div class="card green">
              ✅ AVAILABLE<br>
              <b>${colO}</b><br>
              ${code}<br>
              <button class="btn-blue" onclick="saveYes()">ADD TO SOLD</button>
            </div>`;
        } else {
          document.getElementById("result").innerHTML =
            `<div class="no-results">❌ NOT FOUND<br>${code}</div>`;
        }
      }
    );

  } catch (err) {
    console.error(err);
    alert("Camera error / permission denied");
    isScanning = false;
    document.getElementById("reader").style.display = "none";
  }
}

/* ================= STOP SCANNER SAFELY ================= */
async function stopScanner() {
  isScanning = false;

  try {
    if (scanner) {
      await scanner.stop();
      await scanner.clear();
      scanner = null;
    }
  } catch (e) {
    console.log("Stop ignored:", e);
  }

  document.getElementById("reader").style.display = "none";
}

/* ================= SAVE ================= */
async function saveYes() {
  if (isSaving) return;
  isSaving = true;

  const res = await fetch(API_URL +
    "?action=save&barcode=" + encodeURIComponent(tempCode) +
    "&siNo=" + encodeURIComponent(tempSi));

  const data = await res.json();

  document.getElementById("result").innerHTML =
    `<div class="card green">✅ SAVED<br>${data.status}</div>`;

  isSaving = false;
}

/* ================= SEARCH ================= */
async function searchSI() {
  clearUI();

  const siNo = document.getElementById("siNo").value;

  const res = await fetch(API_URL + "?action=searchSI&siNo=" + encodeURIComponent(siNo));
  const data = await res.json();

  const out = document.getElementById("searchResult");

  if (!data.items?.length) {
    out.innerHTML = `<div class="no-results">❌ No results</div>`;
    return;
  }

  out.innerHTML = data.items.map((item, i) => `
    <div class="card">
      #${i + 1}<br>
      <b>${item.colO}</b><br>
      ${item.barcode}
    </div>
  `).join("");
}

/* ================= UTIL ================= */
function clearUI() {
  document.getElementById("result").innerHTML = "";
  document.getElementById("searchResult").innerHTML = "";
}

/* ================= BEEP ================= */
let audioCtx;

function beep() {
  if (!audioCtx) audioCtx = new AudioContext();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";
  osc.frequency.value = 900;
  gain.gain.value = 0.15;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.12);
}

</script>

</body>
</html>
