<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #eef2f7;
}

.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px;
  background: linear-gradient(135deg, #2196f3, #1976d2);
  color: white;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.header img {
  width: 40px;
  height: 40px;
  background: white;
  border-radius: 8px;
  padding: 3px;
}

.container { padding: 15px; }

#reader {
  width: 100%;
  max-width: 360px;
  margin: auto;
  border-radius: 15px;
  overflow: hidden;
}

input {
  padding: 14px;
  width: 100%;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  margin-top: 12px;
}

button {
  padding: 14px;
  width: 100%;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.25s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
}

button:hover {
  transform: translateY(-3px);
}

.btn-blue {
  background: linear-gradient(135deg, #2196f3, #1976d2);
  color: white;
}

.btn-orange {
  background: linear-gradient(135deg, #ff7043, #ff5722);
  color: white;
}

.card {
  padding: 15px;
  border-radius: 15px;
  margin-top: 12px;
  background: white;
}

.green { border-left: 6px solid #2ecc71; }
.red { border-left: 6px solid #e74c3c; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#eef2f7;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
  <h2>🔐 SYSTEM LOGIN</h2>
  <input id="password" type="password" placeholder="Enter Password" style="padding:14px;width:80%;max-width:300px;border-radius:10px;border:none;">
  <button class="btn-blue" style="width:80%;max-width:300px;" onclick="login()">LOGIN</button>
  <p id="loginStatus"></p>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="header">
    <img src="https://drive.google.com/thumbnail?id=1tOeVr8yecFf_REL9zHznEh9Qs2clqVrt&sz=w200">
    <h3>SCAN SYSTEM</h3>
  </div>

  <div class="container">

    <div id="reader" style="display:none;"></div>

    <input id="siNo" placeholder="Enter SI No">

    <button class="btn-blue" onclick="toggleScan()">📷 START SCAN</button>
    <button class="btn-blue" onclick="switchCamera()">🔄 SWITCH CAMERA</button>
    <button class="btn-blue" onclick="searchSI()">🔍 SEARCH SI</button>
    <button class="btn-orange" onclick="refreshPage()">♻ REFRESH</button>

    <p id="result">Ready</p>
    <div id="searchResult"></div>

  </div>
</div>

<script>

let scanner = null;
let isScanning = false;

let tempCode = "";
let tempSi = "";

let cameraList = [];
let currentCameraIndex = 0;

const API_URL = "https://script.google.com/macros/s/AKfycbxLtOotG_vl5G2FNVufwt-gZyW7LOLfONyj7PQTzAPEdyW_LqN27OcxQpui8WHguaMb3Q/exec";

/* LOGIN */
async function login() {
  const pass = document.getElementById("password").value;

  const res = await fetch(API_URL + "?action=login&password=" + encodeURIComponent(pass));
  const data = await res.json();

  if (data.status === "OK") {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    document.getElementById("loginStatus").innerText = "❌ Wrong password";
  }
}

/* CAMERA INIT */
async function initCameras() {
  cameraList = await Html5Qrcode.getCameras();

  if (!cameraList.length) return;

  currentCameraIndex = 0;

  for (let i = 0; i < cameraList.length; i++) {
    const label = (cameraList[i].label || "").toLowerCase();
    if (label.includes("back") || label.includes("rear")) {
      currentCameraIndex = i;
      break;
    }
  }
}

/* START SCAN */
async function startScanner(cameraId) {
  scanner = new Html5Qrcode("reader");

  await scanner.start(cameraId, { fps: 10, qrbox: 250 }, onScan);
}

/* TOGGLE SCAN */
async function toggleScan() {
  const siNo = document.getElementById("siNo").value;
  if (!siNo) return alert("Enter SI No");

  if (isScanning) {
    isScanning = false;
    if (scanner) {
      await scanner.stop();
      await scanner.clear();
      scanner = null;
    }
    return;
  }

  clearUI();
  isScanning = true;

  if (!cameraList.length) await initCameras();

  const cameraId = cameraList[currentCameraIndex].id;

  document.getElementById("reader").style.display = "block";

  startScanner(cameraId);
}

/* SWITCH CAMERA (FIXED) */
async function switchCamera() {
  if (!cameraList.length) await initCameras();

  if (!scanner) {
    alert("Start scanner first");
    return;
  }

  await scanner.stop();
  await scanner.clear();
  scanner = null;

  currentCameraIndex = (currentCameraIndex + 1) % cameraList.length;

  startScanner(cameraList[currentCameraIndex].id);
}

/* ON SCAN */
async function onScan(code) {

  if (!isScanning) return;

  isScanning = false;

  if (scanner) {
    await scanner.stop();
    await scanner.clear();
    scanner = null;
  }

  tempCode = code;
  tempSi = document.getElementById("siNo").value;

  const res = await fetch(API_URL + "?action=check&barcode=" + encodeURIComponent(code));
  const data = await res.json();

  let row = data.row || [];
  let colJ = row?.[9] || "";
  let colO = row?.[14] || "";

  document.getElementById("result").innerHTML = `
    <div class="card ${data.status === "FOUND" ? "green" : "red"}">
      <b>${data.status}</b><br><br>
      <b>${colO}</b><br>
      <b>${code}</b><br>
      <small>${colJ}</small>
    </div>
  `;
}

/* UTIL */
function clearUI() {
  document.getElementById("result").innerHTML = "Ready";
  document.getElementById("searchResult").innerHTML = "";
}

function refreshPage() {
  document.getElementById("siNo").value = "";
  clearUI();
}

/* AUDIO */
let audioCtx;

function beep() {
  if (!audioCtx) audioCtx = new AudioContext();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = 900;
  gain.gain.value = 0.1;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

function vibrate() {
  if (navigator.vibrate) navigator.vibrate(100);
}

</script>

</body>
</html>
