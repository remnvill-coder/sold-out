<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>

body {
    font-family: Arial;
    margin: 0;
    background: #eef2f7;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    background: linear-gradient(135deg, #2196f3, #1976d2);
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.header img {
    width: 40px;
    height: 40px;
    background: white;
    border-radius: 8px;
    padding: 3px;
}

/* CONTAINER */
.container {
    padding: 15px;
}

/* SCANNER */
#reader {
    width: 100%;
    max-width: 360px;
    margin: auto;
    border-radius: 15px;
    overflow: hidden;
}

/* INPUT */
input {
    padding: 14px;
    width: 100%;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    margin-top: 12px;
}

/* BUTTONS */
button {
    padding: 14px;
    width: 100%;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
}

.btn-blue {
    background: #1976d2;
    color: white;
}

.btn-orange {
    background: #ff5722;
    color: white;
}

/* CARD */
.card {
    padding: 15px;
    border-radius: 15px;
    margin-top: 12px;
    background: white;
}

.green { border-left: 6px solid #2ecc71; }
.red { border-left: 6px solid #e74c3c; }

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="https://drive.google.com/thumbnail?id=1tOeVr8yecFf_REL9zHznEh9Qs2clqVrt&sz=w200">
    <h3 style="margin:0;">SCAN ITEM SYSTEM</h3>
</div>

<div class="container">

    <div id="reader"></div>

    <input id="siNo" placeholder="Enter SI No">

    <button class="btn-blue" onclick="startScan()">📷 START SCAN</button>
    <button class="btn-blue" onclick="searchSI()">🔍 SEARCH SI</button>
    <button class="btn-orange" onclick="refreshPage()">♻ REFRESH</button>

    <p id="result">Ready</p>
    <div id="searchResult"></div>

</div>

<script>

let scanner = null;
let isScanning = false;
let isSaving = false;

let tempCode = "";
let tempSi = "";

/* AUDIO */
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function beep() {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 900;
    gain.gain.value = 0.15;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
}

function vibrate() {
    if (navigator.vibrate) navigator.vibrate([150,80,150]);
}

document.addEventListener("click", initAudio, { once: true });

const API_URL = "https://script.google.com/macros/s/AKfycbxnxEZdqfOCnojhSPHqXSyhiZCTbamrUcdoZY15sFLXcTuV7AUmGWiEFygyRoHgHJr7ZA/exec";

/* ================= HELPERS ================= */
function buildDetails(row) {

    let colJ = row[9] || "";
    let colM = row[12] || "";
    let colO = row[14] || "";

    let html = "";

    if (colJ) html += `<b>Col J:</b> ${colJ}<br>`;
    if (colM) html += `<b>Col M:</b> ${colM}<br>`;
    if (colO) html += `<b>Description:</b> ${colO}<br>`;

    return html;
}

/* RESET */
function clearUI() {
    document.getElementById("result").innerHTML = "Ready";
    document.getElementById("searchResult").innerHTML = "";
}

/* SCAN */
async function startScan() {

    clearUI();

    const siNo = document.getElementById("siNo").value;
    if (!siNo) return alert("Enter SI No");

    const devices = await Html5Qrcode.getCameras();

    let cameraId = devices[0].id;
    for (let d of devices) {
        const label = (d.label || "").toLowerCase();
        if (label.includes("back") || label.includes("rear")) {
            cameraId = d.id;
            break;
        }
    }

    scanner = new Html5Qrcode("reader");

    await scanner.start(
        cameraId,
        { fps: 10, qrbox: 250 },
        async (code) => {

            if (isScanning) return;
            isScanning = true;

            await scanner.stop();
            await scanner.clear();
            scanner = null;

            beep();
            vibrate();

            tempCode = code;
            tempSi = siNo;

            const res = await fetch(API_URL +
                "?action=check&barcode=" + encodeURIComponent(code));

            const data = await res.json();

            let row = data.row || [];
            let details = buildDetails(row);

            if (data.status === "FOUND") {

                document.getElementById("result").innerHTML = `
                    <div class="card green">
                        ✅ AVAILABLE<br><br>
                        ${details}

                        <button id="saveBtn" class="btn-blue" onclick="saveYes()">
                            ADD TO SOLD
                        </button>

                        <button class="btn-orange" onclick="cancelNo()">
                            CANCEL
                        </button>
                    </div>
                `;
            }

            else if (data.status === "DUPLICATE") {

                document.getElementById("result").innerHTML = `
                    <div class="card red">
                        ⚠ ALREADY SOLD<br><br>
                        ${details}
                    </div>
                `;
            }

            else {
                document.getElementById("result").innerHTML = `
                    <div class="card red">
                        ❌ NOT FOUND
                    </div>
                `;
            }

            isScanning = false;
        }
    );
}

/* SAVE */
async function saveYes() {

    if (isSaving) return;
    isSaving = true;

    document.getElementById("saveBtn").disabled = true;
    document.getElementById("result").innerHTML = "⏳ Saving...";

    const res = await fetch(API_URL +
        "?action=save&barcode=" + encodeURIComponent(tempCode) +
        "&siNo=" + encodeURIComponent(tempSi));

    const data = await res.json();

    let row = data.row || [];

    document.getElementById("result").innerHTML = `
        <div class="card green">
            ✅ ${data.status}<br><br>
            ${buildDetails(row)}
        </div>
    `;

    isSaving = false;
}

/* SEARCH */
async function searchSI() {

    clearUI();

    const siNo = document.getElementById("siNo").value;

    const res = await fetch(API_URL +
        "?action=searchSI&siNo=" + encodeURIComponent(siNo));

    const data = await res.json();

    const out = document.getElementById("searchResult");

    if (!data.items?.length) {
        out.innerHTML = "<div class='card'>No results</div>";
        return;
    }

    out.innerHTML = data.items.map((i, idx) => `
        <div class="card">
            #${idx+1}<br>
            ${i.colJ ? `<b>Col J:</b> ${i.colJ}<br>` : ""}
            ${i.colM ? `<b>Col M:</b> ${i.colM}<br>` : ""}
            ${i.colO ? `<b>Description:</b> ${i.colO}<br>` : ""}
            <b>${i.barcode}</b>
        </div>
    `).join("");
}

/* CANCEL */
function cancelNo() {
    document.getElementById("result").innerHTML = "❌ CANCELLED";
}

/* REFRESH */
function refreshPage() {
    document.getElementById("siNo").value = "";
    clearUI();
}

</script>

</body>
</html>
