<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 15px;
    background: #f4f6f8;
}

h2 {
    font-size: 22px;
}

#reader {
    width: 100%;
    max-width: 350px;
    margin: auto;
}

button {
    padding: 14px;
    font-size: 16px;
    margin-top: 10px;
    width: 90%;
    background: #1976d2;
    color: white;
    border: none;
    border-radius: 8px;
}

button:disabled {
    background: gray;
}

#result, #searchResult {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>

<body>

<h2>SCAN ITEM QR</h2>

<div id="reader"></div>

<label style="font-weight:bold; font-size:16px;">SI No.</label><br>

<input 
    type="text" 
    id="siNo" 
    placeholder="Enter SI No."
    style="padding:12px;width:85%;font-size:16px;margin-top:5px;"
    required
/>

<button id="scanBtn" onclick="startScan()">START SCAN</button>

<button id="searchBtn" onclick="searchSI()">
SEARCH SI NO
</button>

<p id="result">Ready</p>

<div id="searchResult"></div>

<script>

let scanner = null;
let isScanning = false;

const API_URL = "https://script.google.com/macros/s/AKfycby6Rl_qOUVitHtbq9neALuMgHHO5HbuWtphBLUw-DzlAeZqrEBgeB_dksdq3PYRAglE/exec";


// =========================
// QR SCAN FUNCTION
// =========================
async function startScan() {

    const result = document.getElementById("result");
    const btn = document.getElementById("scanBtn");

    const currentSINo = document.getElementById("siNo").value.trim();

    if (!currentSINo) {
        result.innerHTML = "⚠ Please enter SI No. before scanning.";
        return;
    }

    if (scanner !== null) {
        try {
            await scanner.stop();
            await scanner.clear();
        } catch (e) {}
        scanner = null;
    }

    btn.disabled = true;
    result.innerHTML = "Starting camera...";

    try {

        const devices = await Html5Qrcode.getCameras();

        if (!devices.length) {
            result.innerHTML = "No camera found ❌";
            btn.disabled = false;
            return;
        }

        const cameraId =
            devices.find(d =>
                d.label &&
                d.label.toLowerCase().includes("back")
            )?.id || devices[0].id;

        scanner = new Html5Qrcode("reader");

        await scanner.start(
            cameraId,
            { fps: 10, qrbox: 250 },

            async (decodedText) => {

                if (isScanning) return;
                isScanning = true;

                result.innerHTML = "Processing...";

                try {

                    await scanner.stop();
                    await scanner.clear();
                    scanner = null;

                    const res = await fetch(
                        API_URL +
                        "?barcode=" + encodeURIComponent(decodedText) +
                        "&siNo=" + encodeURIComponent(currentSINo)
                    );

                    const data = await res.json();

                    if (data.status === "DUPLICATE") {

                        result.innerHTML =
                            "<span style='color:red;font-size:24px;'>⚠ ALREADY SCANNED</span><br>" +
                            "Barcode: " + decodedText;

                    } 
                    else if (data.status === "FOUND") {

                        result.innerHTML =
                            "<span style='color:green;font-size:24px;'>✅ SOLD</span><br>" +
                            "Barcode: " + decodedText;

                    } 
                    else {

                        result.innerHTML =
                            "<span style='color:red;font-size:24px;'>❌ NOT FOUND</span><br>" +
                            "Barcode: " + decodedText;
                    }

                } catch (err) {
                    result.innerHTML = "ERROR ❌ " + err.message;
                }

                isScanning = false;
                btn.disabled = false;
            }

        );

    } catch (err) {
        result.innerHTML = "Cannot access camera.";
        btn.disabled = false;
    }
}


// =========================
// SEARCH SI NO FUNCTION
// =========================
async function searchSI() {

    const siNo = document.getElementById("siNo").value.trim();
    const output = document.getElementById("searchResult");

    if (!siNo) {
        output.innerHTML = "⚠ Please enter SI No.";
        return;
    }

    output.innerHTML = "Searching...";

    try {

        const res = await fetch(
            API_URL +
            "?action=searchSI&siNo=" + encodeURIComponent(siNo)
        );

        const data = await res.json();

        if (!data.success) {
            output.innerHTML = "❌ " + data.error;
            return;
        }

        if (data.items.length === 0) {
            output.innerHTML = "❌ No items found.";
            return;
        }

        let html = `<b>SI No:</b> ${siNo}<br>`;
        html += `<b>Total Items:</b> ${data.count}<br><br>`;

        data.items.forEach((item, i) => {
            html += `
                <div style="border:1px solid #ccc;padding:10px;margin:5px;">
                    <b>#${i+1}</b><br>
                    Barcode: ${item.barcode}<br>
                    Lens: ${item.lens}<br>
                    Grade: ${item.grade}
                </div>
            `;
        });

        output.innerHTML = html;

    } catch (err) {
        output.innerHTML = "ERROR ❌ " + err.message;
    }
}

</script>

</body>
</html>
