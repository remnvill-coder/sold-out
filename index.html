<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
/* ===== YOUR CSS UNCHANGED ===== */
body { font-family: Arial; margin: 0; background: #eef2f7; }

.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px;
  background: linear-gradient(135deg, #2196f3, #1976d2);
  color: white;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.header img {
  width: 40px;
  height: 40px;
  background: white;
  border-radius: 8px;
  padding: 3px;
}

.container { padding: 15px; }

#reader { width: 100%; max-width: 360px; margin: auto; border-radius: 15px; overflow: hidden; }

input {
  padding: 14px;
  width: 100%;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  margin-top: 12px;
}

button {
  padding: 14px;
  width: 100%;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
}

button:hover { transform: translateY(-3px); box-shadow: 0 10px 18px rgba(0,0,0,0.18); }
button:active { transform: translateY(1px) scale(0.98); }

.btn-blue { background: linear-gradient(135deg, #2196f3, #1976d2); color: white; }
.btn-orange { background: linear-gradient(135deg, #ff7043, #ff5722); color: white; }

.card { padding: 15px; border-radius: 15px; margin-top: 12px; background: white; }
.green { border-left: 6px solid #2ecc71; }
.red { border-left: 6px solid #e74c3c; }

.saving {
  border-left: 6px solid #2196f3;
  text-align: center;
  padding: 25px;
  background: linear-gradient(135deg, #e3f2fd, #ffffff);
  color: #1976d2;
  font-weight: bold;
}

.spinner {
  width: 35px;
  height: 35px;
  margin: 0 auto 10px;
  border: 4px solid #cfe8ff;
  border-top: 4px solid #2196f3;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.no-results {
  text-align: center;
  margin-top: 20px;
  padding: 20px;
  font-weight: bold;
  color: #666;
  background: white;
  border-radius: 12px;
}

.scan-animate {
  animation: popIn 0.35s ease-out, glow 1s ease-in-out;
}

@keyframes popIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes glow {
  0% { box-shadow: 0 0 0 rgba(46,204,113,0); }
  50% { box-shadow: 0 0 25px rgba(46,204,113,0.8); }
  100% { box-shadow: 0 0 0 rgba(46,204,113,0); }
}
</style>
</head>

<body>

<div id="loginScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#eef2f7;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;">
  <h2>🔐 SYSTEM LOGIN</h2>
  <input id="password" type="password" placeholder="Enter Password" style="padding:14px;width:80%;max-width:300px;border-radius:10px;border:none;">
  <button class="btn-blue" style="width:80%;max-width:300px;" onclick="login()">LOGIN</button>
  <p id="loginStatus"></p>
</div>

<div id="app" style="display:none;">
  <div class="header">
    <img src="https://drive.google.com/thumbnail?id=1U9kmQ7qummOCpVppdLtmVaugMuzLYUWQ&sz=w200">
    <h3>GAISANO ILOILO BRANCH</h3>
  </div>

  <div class="container">
    <div id="reader" style="display:none;"></div>

    <input id="siNo" placeholder="Enter SI No">

    <button class="btn-blue" onclick="toggleScan()">📷 START SCAN</button>
    <button class="btn-blue" onclick="searchSI()">🔍 SEARCH SI</button>
    <button class="btn-orange" onclick="refreshPage()">♻ REFRESH</button>

    <input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none">
    <button class="btn-blue" onclick="openCamera()">📸 CAPTURE PHOTO</button>

    <div id="photoPreview"></div>

    <button class="btn-orange" onclick="uploadPhotos()">UPLOAD PHOTOS</button>

    <p id="result"></p>
    <div id="searchResult"></div>
  </div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwjDQisLCHe_I5VQO_HcbOqM3b4jCWdoRtTJ5EdSvYQLZNZBSwnTG1AoyVcVZmtgWK85w/exec";

let scanner = null;
let isScanning = false;
let isSaving = false;

let tempCode = "";
let tempSi = "";
let selectedFiles = [];
let lastUploadedPhotos = [];

/* ================= LOGIN ================= */
async function login() {
  const pass = document.getElementById("password").value;

  const res = await fetch(API_URL + "?action=login&password=" + encodeURIComponent(pass));
  const data = await res.json();

  if (data.status === "OK") {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    document.getElementById("loginStatus").innerText = "❌ Wrong password";
  }
}

/* ================= SCANNER ================= */
function setUIScanning(state) {
  document.getElementById("reader").style.display = state ? "block" : "none";
}

async function toggleScan() {
  const siNo = document.getElementById("siNo").value;
  if (!siNo) return alert("Enter SI No");

  if (isScanning) {
    isScanning = false;
    if (scanner) {
      await scanner.stop();
      await scanner.clear();
      scanner = null;
    }
    setUIScanning(false);
    return;
  }

  clearUI();

  isScanning = true;
  setUIScanning(true);

  const devices = await Html5Qrcode.getCameras();
  let cameraId = devices[0].id;

  scanner = new Html5Qrcode("reader");

  try {
    await scanner.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      async (code) => {

        if (!isScanning) return;

        isScanning = false;
        await scanner.stop();
        await scanner.clear();
        scanner = null;

        setUIScanning(false);

        tempCode = code;
        tempSi = siNo;

        const res = await fetch(API_URL + "?action=check&barcode=" + encodeURIComponent(code));
        const data = await res.json();

        let row = data.row || [];
        let colJ = data.colJ || row?.[9] || "";
        let colO = data.colO || row?.[14] || "";

        if (data.status === "FOUND") {
          document.getElementById("result").innerHTML =
            `<div class="card green scan-animate">
              ✅ AVAILABLE<br><b>${colO}</b><br>${code}
              <br><button class="btn-blue" onclick="saveYes()">ADD TO SOLD</button>
            </div>`;
        } else {
          document.getElementById("result").innerHTML =
            `<div class="no-results">❌ NOT FOUND<br>${code}</div>`;
        }
      }
    );
  } catch (err) {
    alert("Camera error");
    isScanning = false;
    setUIScanning(false);
  }
}

/* ================= SAVE ================= */
async function saveYes() {
  if (isSaving) return;
  isSaving = true;

  const res = await fetch(API_URL +
    "?action=save&barcode=" + encodeURIComponent(tempCode) +
    "&siNo=" + encodeURIComponent(tempSi));

  const data = await res.json();

  document.getElementById("result").innerHTML =
    `<div class="card green">✅ SAVED<br>${data.status}</div>`;

  isSaving = false;
}

/* ================= SEARCH ================= */
async function searchSI() {
  clearUI();

  const siNo = document.getElementById("siNo").value;

  const res = await fetch(API_URL + "?action=searchSI&siNo=" + encodeURIComponent(siNo));
  const data = await res.json();

  const out = document.getElementById("searchResult");

  if (!data.items?.length) {
    out.innerHTML = `<div class="no-results">❌ No results</div>`;
    return;
  }

  let html = data.items.map((item, i) =>
    `<div class="card">#${i+1}<br><b>${item.colO}</b><br>${item.barcode}</div>`
  ).join("");

  if (lastUploadedPhotos.length === 2) {
    html += `
      <div class="card">
        📸 Photos<br>
        <img src="${lastUploadedPhotos[0]}" width="80">
        <img src="${lastUploadedPhotos[1]}" width="80">
      </div>`;
  }

  out.innerHTML = html;
}

/* ================= CAMERA ================= */
function openCamera() {
  document.getElementById("cameraInput").click();
}

document.getElementById("cameraInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  selectedFiles.push(file);

  const img = document.createElement("img");
  img.src = URL.createObjectURL(file);
  img.style.width = "80px";
  document.getElementById("photoPreview").appendChild(img);

  e.target.value = "";
});

async function uploadPhotos() {
  const siNo = document.getElementById("siNo").value.trim();
  if (!siNo) return alert("Enter SI No");
  if (selectedFiles.length !== 2) return alert("Need 2 photos");

  const base64_1 = await fileToBase64(selectedFiles[0]);
  const base64_2 = await fileToBase64(selectedFiles[1]);

  const formData = new URLSearchParams();
  formData.append("action", "uploadPhotos");
  formData.append("siNo", siNo);
  formData.append("photo1", base64_1);
  formData.append("photo2", base64_2);

  const res = await fetch(API_URL, { method: "POST", body: formData });
  const data = await res.json();

  if (data.status === "OK") {
    lastUploadedPhotos = [data.link1, data.link2];
    selectedFiles = [];
    document.getElementById("photoPreview").innerHTML = "";

    document.getElementById("result").innerHTML =
      `<div class="card green">✅ UPLOADED</div>`;
  }
}

/* ================= UTIL ================= */
function clearUI() {
  document.getElementById("result").innerHTML = "";
  document.getElementById("searchResult").innerHTML = "";
}

function fileToBase64(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.readAsDataURL(file);
  });
}

</script>

</body>
</html>
