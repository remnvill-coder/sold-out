<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 15px;
    background: #f4f6f8;
}

#reader {
    width: 100%;
    max-width: 350px;
    margin: auto;
    border-radius: 12px;
    overflow: hidden;
}

input {
    padding: 12px;
    width: 85%;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 14px;
    width: 90%;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.btn-blue {
    background: linear-gradient(135deg, #2196f3, #1976d2);
    color: white;
}

.btn-orange {
    background: linear-gradient(135deg, #ff9800, #ff5722);
    color: white;
}

button:hover {
    transform: scale(1.02);
}

.card {
    padding: 14px;
    border-radius: 12px;
    margin-top: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.green { background: #d4f8d4; border: 2px solid green; }
.red { background: #ffd6d6; border: 2px solid red; }

#result, #searchResult {
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>📦 SCAN ITEM SYSTEM</h2>

<div id="reader"></div>

<input id="siNo" placeholder="Enter SI No">

<button class="btn-blue" onclick="startScan()">📷 START SCAN</button>
<button class="btn-blue" onclick="searchSI()">🔍 SEARCH SI</button>
<button class="btn-orange" onclick="refreshPage()">♻ REFRESH</button>

<p id="result">Ready</p>
<div id="searchResult"></div>

<script>

let scanner = null;
let isScanning = false;

let tempCode = "";
let tempSi = "";

// ================= AUDIO =================
let audioCtx = null;
document.addEventListener("click", () => {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
}, { once: true });

function beep() {
    if (!audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 800;
    gain.gain.value = 0.2;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
}

function vibrate() {
    if (navigator.vibrate) navigator.vibrate([200,100,200]);
}

const API_URL = "https://script.google.com/macros/s/AKfycbyhKOr7AIcGlMsBVlKwMP4KYKI7-W-AfBzeZHwovGMtLEzDjc62sbXT7Xgtak2Hm-eCGQ/exec";


// ================= SCAN =================
async function startScan() {

    const siNo = document.getElementById("siNo").value.trim();

    if (!siNo) {
        document.getElementById("result").innerHTML = "⚠ Enter SI No";
        return;
    }

    document.getElementById("searchResult").innerHTML = "";

    if (scanner) {
        try { await scanner.stop(); await scanner.clear(); } catch(e){}
        scanner = null;
    }

    const devices = await Html5Qrcode.getCameras();
    const cameraId = devices[devices.length - 1].id;

    scanner = new Html5Qrcode("reader");

    await scanner.start(cameraId, { fps: 10, qrbox: 250 },

    async (code) => {

        if (isScanning) return;
        isScanning = true;

        await scanner.stop();
        await scanner.clear();
        scanner = null;

        beep();
        vibrate();

        tempCode = code;
        tempSi = siNo;

        const res = await fetch(API_URL +
            "?barcode=" + encodeURIComponent(code) +
            "&siNo=" + encodeURIComponent(siNo));

        const data = await res.json();

        let colJ = data.colJ || "";
        let colO = data.colO || "";

        let details =
            (colJ ? `<b>Lens:</b> ${colJ}<br>` : "") +
            `<b>Description:</b> ${colO}`;

        if (data.status === "FOUND") {

            document.getElementById("result").innerHTML = `
                <div class="card green">
                    ✅ Available<br><br>
                    ${details}<br><br>

                    <button onclick="saveYes()" style="background:green;color:white;">
                        ADD TO SOLD?
                    </button>

                    <button onclick="cancelNo()" style="background:red;color:white;">
                        NO
                    </button>
                </div>
            `;
        }

        else if (data.status === "DUPLICATE") {

            document.getElementById("result").innerHTML = `
                <div class="card red">
                    ⚠ Already sold or Scanned<br><br>
                    ${details}<br><br>

                    <button onclick="cancelNo()" style="background:red;color:white;">
                        OK
                    </button>
                </div>
            `;
        }

        else {
            document.getElementById("result").innerHTML = "❌ NOT FOUND";
        }

        isScanning = false;
    });
}


// ================= SAVE YES =================
async function saveYes() {

    const res = await fetch(API_URL +
        "?barcode=" + encodeURIComponent(tempCode) +
        "&siNo=" + encodeURIComponent(tempSi));

    const data = await res.json();

    document.getElementById("result").innerHTML = `
        <div class="card green">
            ✅ Sold<br><br>
            ${data.colJ ? "Lens: " + data.colJ + "<br>" : ""}
            Description: ${data.colO || ""}
        </div>
    `;
}


// ================= CANCEL =================
function cancelNo() {
    document.getElementById("result").innerHTML = "❌ CANCELLED";
}


// ================= SEARCH =================
async function searchSI() {

    const siNo = document.getElementById("siNo").value.trim();
    const out = document.getElementById("searchResult");

    document.getElementById("result").innerHTML = "Ready";

    const res = await fetch(API_URL + "?action=searchSI&siNo=" + encodeURIComponent(siNo));
    const data = await res.json();

    if (!data.items || data.items.length === 0) {
        out.innerHTML = "No results";
        return;
    }

    let html = "";

    data.items.forEach((i, index) => {

        html += `
        <div class="card">
            #${index+1}<br>
            ${i.colJ ? `<b>Lens:</b> ${i.colJ}<br>` : ""}
            <b>Description:</b> ${i.colO}<br>
            ${i.barcode}
        </div>`;
    });

    out.innerHTML = html;
}


// ================= REFRESH =================
function refreshPage() {

    document.getElementById("siNo").value = "";
    document.getElementById("result").innerHTML = "Ready";
    document.getElementById("searchResult").innerHTML = "";

    if (scanner) {
        scanner.stop();
        scanner.clear();
        scanner = null;
    }
}

</script>

</body>
</html>
