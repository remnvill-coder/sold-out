<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #eef2f7;
}

.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    background: linear-gradient(135deg, #2196f3, #1976d2);
    color: white;
    position: sticky;
    top: 0;
}

.container { padding: 15px; }

#reader {
    width: 100%;
    max-width: 360px;
    margin: auto;
}

input {
    padding: 14px;
    width: 100%;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    margin-top: 12px;
}

button {
    padding: 14px;
    width: 100%;
    margin-top: 10px;
    border: none;
    border-radius: 14px;
    font-weight: bold;
    cursor: pointer;
}

.btn-blue { background:#1976d2; color:white; }
.btn-orange { background:#ff5722; color:white; }

.card {
    padding: 15px;
    border-radius: 15px;
    margin-top: 12px;
    background: white;
}

.green { border-left: 6px solid #2ecc71; }
.red { border-left: 6px solid #e74c3c; }

/* LOGIN */
#login {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    color: white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h3>ENTER PASSWORD</h3>
    <input type="password" id="pass">
    <button onclick="login()">LOGIN</button>
</div>

<div class="header">
    <h3>SCAN SYSTEM</h3>
</div>

<div class="container">

    <div id="reader"></div>

    <input id="siNo" placeholder="SI NUMBER">

    <button class="btn-blue" onclick="toggleScan()">START SCAN</button>
    <button class="btn-blue" onclick="searchSI()">SEARCH</button>

    <p id="result">Ready</p>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzXT0DO0vlQf9yX1IxJZGvr9D1Tyf3kiI1sSr-O4BGOuSzwAkulp4rama32KtmfsXmiog/exec";

const PASS = "1234";

function login() {
    if (document.getElementById("pass").value === PASS) {
        document.getElementById("login").style.display = "none";
    } else {
        alert("Wrong password");
    }
}

let scanner = null;
let isScanning = false;

async function toggleScan() {

    const siNo = document.getElementById("siNo").value;
    if (!siNo) return alert("Enter SI");

    if (isScanning) {
        isScanning = false;
        if (scanner) {
            await scanner.stop();
            await scanner.clear();
        }
        return;
    }

    isScanning = true;

    const cams = await Html5Qrcode.getCameras();
    scanner = new Html5Qrcode("reader");

    await scanner.start(
        cams[0].id,
        { fps: 10, qrbox: 250 },
        async (code) => {

            isScanning = false;
            await scanner.stop();
            await scanner.clear();

            const res = await fetch(API_URL +
                "?action=check" +
                "&barcode=" + encodeURIComponent(code) +
                "&siNo=" + encodeURIComponent(siNo) +
                "&pass=1234"
            );

            const data = await res.json();

            document.getElementById("result").innerText = data.status;
        }
    );
}

async function searchSI() {

    const siNo = document.getElementById("siNo").value;

    const res = await fetch(API_URL +
        "?action=searchSI" +
        "&siNo=" + encodeURIComponent(siNo) +
        "&pass=1234"
    );

    const data = await res.json();

    document.getElementById("result").innerText =
        JSON.stringify(data.items || []);
}

</script>

</body>
</html>
