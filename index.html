<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 15px;
    background: #f4f6f8;
}

/* ===== CAMERA BOX ===== */
#reader {
    width: 100%;
    max-width: 350px;
    margin: auto;
    border-radius: 12px;
    overflow: hidden;
}

/* ===== INPUT ===== */
input {
    padding: 12px;
    width: 85%;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* ===== COOL BUTTONS ===== */
button {
    padding: 14px;
    width: 90%;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

/* primary */
.btn-blue {
    background: linear-gradient(135deg, #2196f3, #1976d2);
    color: white;
}

/* orange */
.btn-orange {
    background: linear-gradient(135deg, #ff9800, #ff5722);
    color: white;
}

/* hover effect */
button:hover {
    transform: scale(1.02);
}

/* ===== RESULT CARD ===== */
.card {
    padding: 14px;
    border-radius: 12px;
    margin-top: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.green { background: #d4f8d4; border: 2px solid green; }
.red { background: #ffd6d6; border: 2px solid red; }

#result, #searchResult {
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>📦 SCAN ITEM SYSTEM</h2>

<div id="reader"></div>

<input id="siNo" placeholder="Enter SI No">

<button class="btn-blue" onclick="startScan()">📷 START SCAN</button>
<button class="btn-blue" onclick="searchSI()">🔍 SEARCH SI</button>
<button class="btn-orange" onclick="refreshPage()">♻ REFRESH</button>

<p id="result">Ready</p>
<div id="searchResult"></div>

<script>

let scanner = null;
let isScanning = false;

// ================= CLEAN RESULT CONTROL =================
function clearAllResults() {
    document.getElementById("result").innerHTML = "Ready";
    document.getElementById("searchResult").innerHTML = "";
}

// ================= AUDIO =================
let audioCtx = null;
let audioUnlocked = false;

document.addEventListener("click", () => {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
    audioUnlocked = true;
}, { once: true });

function playBeep() {
    if (!audioCtx || !audioUnlocked) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 800;
    gain.gain.value = 0.2;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
}

function vibrateDevice() {
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}

const API_URL = "https://script.google.com/macros/s/AKfycbw8UojkaFiFqsXR1JQgnF1HLc3O3i95DgceH14S-9HyEU_848i4DIJzzaXPqIaXj3-08A/exec";


// ================= SCAN =================
async function startScan() {

    const siNo = document.getElementById("siNo").value.trim();

    if (!siNo) {
        document.getElementById("result").innerHTML = "⚠ Enter SI No";
        return;
    }

    // 🔥 CLEAN OLD SEARCH BEFORE SCAN
    document.getElementById("searchResult").innerHTML = "";

    if (scanner) {
        try { await scanner.stop(); await scanner.clear(); } catch(e){}
        scanner = null;
    }

    const devices = await Html5Qrcode.getCameras();
    const cameraId = devices[devices.length - 1].id;

    scanner = new Html5Qrcode("reader");

    await scanner.start(
        cameraId,
        { fps: 10, qrbox: 250 },

        async (code) => {

            if (isScanning) return;
            isScanning = true;

            // 🔥 CLEAR SEARCH WHEN SCANNING
            document.getElementById("searchResult").innerHTML = "";

            await scanner.stop();
            await scanner.clear();
            scanner = null;

            playBeep();
            vibrateDevice();

            const res = await fetch(API_URL + "?barcode=" + encodeURIComponent(code) + "&siNo=" + encodeURIComponent(siNo));
            const data = await res.json();

            let colM = data.colM || "";
            let colJ = data.colJ || "";
            let colO = data.colO || "";

            let details =
                `<b>Col M:</b> ${colM}<br>` +
                (colJ ? `<b>Lens:</b> ${colJ}<br>` : "") +
                `<b>Description:</b> ${colO}`;

            if (data.status === "FOUND") {

                document.getElementById("result").innerHTML = `
                    <div class="card green">
                        ✅ FOUND<br><br>
                        ${details}
                    </div>`;
            }

            else if (data.status === "DUPLICATE") {

                document.getElementById("result").innerHTML = `
                    <div class="card red">
                        ⚠ DUPLICATE<br><br>
                        ${details}
                    </div>`;
            }

            else {
                document.getElementById("result").innerHTML = "❌ NOT FOUND";
            }

            isScanning = false;
        }
    );
}


// ================= SEARCH =================
async function searchSI() {

    const siNo = document.getElementById("siNo").value.trim();

    // 🔥 CLEAN SCAN RESULT BEFORE SEARCH
    document.getElementById("result").innerHTML = "Ready";

    const out = document.getElementById("searchResult");

    const res = await fetch(API_URL + "?action=searchSI&siNo=" + siNo);
    const data = await res.json();

    if (!data.items.length) {
        out.innerHTML = "No results";
        return;
    }

    let html = "";

    data.items.forEach((i, index) => {

        html += `
        <div class="card">
            #${index+1}<br>
            <b>Col M:</b> ${i.colM}<br>
            <b>Lens:</b> ${i.colJ}<br>
            <b>Description:</b> ${i.colO}<br>
            ${i.barcode}
        </div>`;
    });

    out.innerHTML = html;
}


// ================= REFRESH =================
function refreshPage() {

    document.getElementById("siNo").value = "";
    clearAllResults();

    if (scanner) {
        scanner.stop();
        scanner.clear();
        scanner = null;
    }
}

</script>

</body>
</html>
