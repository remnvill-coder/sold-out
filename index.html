<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #eef2f7;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    background: linear-gradient(135deg, #2196f3, #1976d2);
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.header img {
    width: 40px;
    height: 40px;
    background: white;
    border-radius: 8px;
    padding: 3px;
}

/* CONTAINER */
.container {
    padding: 15px;
}

/* SCANNER */
#reader {
    width: 100%;
    max-width: 360px;
    margin: auto;
    border-radius: 15px;
    overflow: hidden;
}

/* INPUT */
input {
    padding: 14px;
    width: 100%;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    margin-top: 12px;
}

/* BUTTONS */
button {
    padding: 14px;
    width: 100%;
    margin-top: 10px;
    border: none;
    border-radius: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.12);
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 18px rgba(0,0,0,0.18);
}

button:active {
    transform: translateY(1px) scale(0.98);
}

.btn-blue {
    background: linear-gradient(135deg, #2196f3, #1976d2);
    color: white;
}

.btn-orange {
    background: linear-gradient(135deg, #ff7043, #ff5722);
    color: white;
}

/* CARD */
.card {
    padding: 15px;
    border-radius: 15px;
    margin-top: 12px;
    background: white;
}

.green {
    border-left: 6px solid #2ecc71;
}

.red {
    border-left: 6px solid #e74c3c;
}

/* SAVING CARD */
.saving {
    border-left: 6px solid #2196f3;
    text-align: center;
    padding: 25px;
    background: linear-gradient(135deg, #e3f2fd, #ffffff);
    color: #1976d2;
    font-weight: bold;
}

/* SPINNER */
.spinner {
    width: 35px;
    height: 35px;
    margin: 0 auto 10px;
    border: 4px solid #cfe8ff;
    border-top: 4px solid #2196f3;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

/* TEXT STYLE */
.saving-text {
    font-size: 16px;
    letter-spacing: 0.5px;
}

/* ANIMATION */
@keyframes spin {
    to { transform: rotate(360deg); }
}

.no-results {
    text-align: center;
    margin-top: 20px;
    padding: 20px;
    font-weight: bold;
    color: #666;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    animation: fadeIn 0.3s ease-in-out;
}

/* optional smooth appearance */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* SCAN SUCCESS ANIMATION CARD */
.scan-animate {
    animation: popIn 0.35s ease-out, glow 1s ease-in-out;
    transform-origin: center;
}

/* POP IN EFFECT */
@keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* GLOW EFFECT */
@keyframes glow {
    0% { box-shadow: 0 0 0 rgba(46, 204, 113, 0); }
    50% { box-shadow: 0 0 25px rgba(46, 204, 113, 0.8); }
    100% { box-shadow: 0 0 0 rgba(46, 204, 113, 0); }
}
</style>

</head>

<body>

<div id="loginScreen" style="
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#eef2f7;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
">
    <h2>🔐 SYSTEM LOGIN</h2>
    <input id="password" type="password" placeholder="Enter Password"
        style="padding:14px; width:80%; max-width:300px; border-radius:10px; border:none;">
    <button class="btn-blue" style="width:80%; max-width:300px;" onclick="login()">
        LOGIN
    </button>
    <p id="loginStatus"></p>
</div>

<div id="app" style="display:none;">

    <div class="header">
        <img src="https://drive.google.com/thumbnail?id=1U9kmQ7qummOCpVppdLtmVaugMuzLYUWQ&sz=w200">
        <h3 style="margin:0;">GAISANO ILOILO BRANCH</h3>
    </div>

    <div class="container">

        <div id="reader" style="display:none;"></div>

        <input id="siNo" placeholder="Enter SI No">

        <button id="scanBtn" class="btn-blue" onclick="toggleScan()">📷 START SCAN</button>

        <button class="btn-blue" onclick="searchSI()">🔍 SEARCH SI</button>

        <button class="btn-orange" onclick="refreshPage()">♻ REFRESH</button>

        <!-- CAMERA CAPTURE MODULE -->
        <input id="cameraInput" type="file" accept="image/*" capture="environment" multiple style="display:none" />

        <button class="btn-blue" onclick="openCamera()">📸 CAPTURE PHOTO</button>

        <div id="photoPreview" style="display:flex; gap:10px; margin-top:10px;"></div>

        <button class="btn-orange" onclick="uploadPhotos()">UPLOAD PHOTOS</button>

        <p id="result"></p>

        <div id="searchResult"></div>

    </div>
</div>

<script>

  let lastUploadedPhotos = [];

let scanner = null;
let isScanning = false;
let isSaving = false;
let tempCode = "";
let tempSi = "";

const API_URL = "https://script.google.com/macros/s/AKfycbxDye9Li_v3jIvmoFyoO_-pNR_Js1hILOWxEM8gfqN9WccT0k5V-YxvKZlxteFjjSOaTQ/exec";

/* ================= LOGIN ================= */
async function login() {
    const pass = document.getElementById("password").value;

    if (!pass) {
        document.getElementById("loginStatus").innerText = "Enter password";
        return;
    }

    document.getElementById("loginStatus").innerText = "Checking...";

    try {
        const res = await fetch(API_URL + "?action=login&password=" + encodeURIComponent(pass));
        const data = await res.json();

        if (data.status === "OK") {
          lastUploadedPhotos = [data.link1, data.link2];
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("app").style.display = "block";
            lastUploadedPhotos = [data.link1, data.link2];
        } else {
            document.getElementById("loginStatus").innerText = "❌ Wrong password";
        }
    } catch (err) {
        document.getElementById("loginStatus").innerText = "Server error";
    }
}

function setUIScanning(state) {
    const btn = document.getElementById("scanBtn");
    const siBox = document.getElementById("siNo");
    const reader = document.getElementById("reader");
    const refreshBtn = document.querySelector(".btn-orange");

    if (state) {
        btn.innerHTML = "⛔ STOP SCANNING";
        siBox.disabled = true;
        reader.style.display = "block";
        refreshBtn.disabled = true;
        refreshBtn.style.opacity = "0.5";
    } else {
        btn.innerHTML = "📷 START SCAN";
        siBox.disabled = false;
        reader.style.display = "none";
        refreshBtn.disabled = false;
        refreshBtn.style.opacity = "1";
    }
}

async function toggleScan() {
    const siNo = document.getElementById("siNo").value;

    if (!siNo) return alert("Enter SI No");

    if (isScanning) {
        isScanning = false;
        setUIScanning(false);

        if (scanner) {
            await scanner.stop();
            await scanner.clear();
            scanner = null;
        }
        return;
    }

    clearUI();

    isScanning = true;
    setUIScanning(true);

    const devices = await Html5Qrcode.getCameras();
    let cameraId = devices[0].id;

    for (let d of devices) {
        const label = (d.label || "").toLowerCase();
        if (label.includes("back") || label.includes("rear")) {
            cameraId = d.id;
            break;
        }
    }

    scanner = new Html5Qrcode("reader");

    await scanner.start(
        cameraId,
        { fps: 10, qrbox: 250 },
        async (code) => {

            if (!isScanning) return;

            isScanning = false;
            await scanner.stop();
            await scanner.clear();
            scanner = null;

            setUIScanning(false);

            beep();
            vibrate();

            tempCode = code;
            tempSi = siNo;

            const res = await fetch(API_URL + "?action=check&barcode=" + encodeURIComponent(code));
            const data = await res.json();

            let row = data.row || [];
            let colJ = data.colJ || row?.[9] || "";
            let colO = data.colO || row?.[14] || "";

            if (data.status === "FOUND") {
                document.getElementById("result").innerHTML =
                    <div class="card green scan-animate">
                        ✅ AVAILABLE<br><br>
                        <b>${colO}</b><br>
                        ${colJ ? <small>${colJ}</small><br> : ""}
                        <b>${code}</b><br><br>
                        <button id="saveBtn" class="btn-blue" onclick="saveYes()">ADD TO SOLD</button>
                        <button class="btn-orange" onclick="cancelNo()">CANCEL</button>
                    </div>
                ;
            }

            else if (data.status === "DUPLICATE") {
                document.getElementById("result").innerHTML =
                    <div class="card red">
                        🛑 ALREADY SOLD<br><br>
                        <b>${colO}</b><br>
                        ${colJ ? <small>${colJ}</small><br> : ""}
                        <b>${code}</b>
                    </div>
                ;
            }

            else {
                document.getElementById("result").innerHTML =
                    <div class="no-results">
                        ❌ NOT FOUND
                    </div><br>
                    <b>${colO}</b><br>
                    ${colJ ? <small>${colJ}</small> : ""}
                ;
            }
        }
    );
}

async function saveYes() {
    if (isSaving) return;

    isSaving = true;
    document.getElementById("saveBtn").disabled = true;

    document.getElementById("result").innerHTML =
        <div class="card saving">
            <div class="spinner"></div>
            <div class="saving-text">Saving data...</div>
        </div>
    ;

    const res = await fetch(API_URL + "?action=save&barcode=" + encodeURIComponent(tempCode) + "&siNo=" + encodeURIComponent(tempSi));
    const data = await res.json();

    let row = data.row || [];
    let colJ = data.colJ || row?.[9] || "";
    let colO = data.colO || row?.[14] || "";

    document.getElementById("result").innerHTML =
        <div class="card green scan-animate">
            <div>✅ ${data.status}</div><br>
            <b style="font-size:16px;">${colO}</b><br>
            ${colJ ? <small style="color:#666;">${colJ}</small><br> : ""}
            <div style="margin-top:12px; font-size:14px; letter-spacing:1px;">
                🏷️ ${tempCode}
            </div>
        </div>
    ;

    isSaving = false;
}

lastUploadedPhotos = [];

async function searchSI() {
    clearUI();
 out.innerHTML += photoHTML; 
  const out = document.getElementById("searchResult");

    const siNo = document.getElementById("siNo").value;

    const res = await fetch(API_URL + "?action=searchSI&siNo=" + encodeURIComponent(siNo));
    const data = await res.json();

    const out = document.getElementById("searchResult");

    if (!data.items?.length) {
        out.innerHTML =
            <div class="no-results">
                ❌ No results found
            </div>
        ;
        return;
    }

    out.innerHTML = data.items.map((item, idx) =>
        <div class="card">
            #${idx + 1}<br>
            <b>${item.colO}</b><br>
            ${item.colJ ? <small>${item.colJ}</small><br> : ""}
            ${item.barcode}
        </div>
    ).join("");
              let photoHTML = "";

if (lastUploadedPhotos.length === 2) {
  photoHTML = `
    <div class="card">
      <b>📸 Uploaded Photos</b><br><br>
      <img src="${lastUploadedPhotos[0]}" style="width:100px;height:100px;border-radius:10px;object-fit:cover;">
      <img src="${lastUploadedPhotos[1]}" style="width:100px;height:100px;border-radius:10px;object-fit:cover;margin-left:10px;">
    </div>
  `;
}

out.innerHTML += photoHTML;
}
 
  


/* ================= UTIL ================= */
function clearUI() {
    document.getElementById("result").innerHTML = "";
    document.getElementById("searchResult").innerHTML = "";
}

function cancelNo() {
    document.getElementById("result").innerHTML =
        <div class="no-results">
            ❌ CANCELLED
        </div>
    ;
}

function refreshPage() {
    document.getElementById("siNo").value = "";
    clearUI();
}

function openCamera() {
    document.getElementById("cameraInput").click();
}

let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function beep() {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 900;
    gain.gain.value = 0.15;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
}

function vibrate() {
    if (navigator.vibrate) navigator.vibrate([150, 80, 150]);
}

document.addEventListener("click", initAudio, { once: true });

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
            const base64 = reader.result.split(",")[1];
            resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

let selectedFiles = [];

document.getElementById("cameraInput").addEventListener("change", function (e) {
    const file = e.target.files[0];
    if (!file) return;

    selectedFiles.push(file);

    const preview = document.getElementById("photoPreview");

    const img = document.createElement("img");
    img.style.width = "80px";
    img.style.height = "80px";
    img.style.objectFit = "cover";
    img.style.borderRadius = "10px";
    img.src = URL.createObjectURL(file);

    preview.appendChild(img);

    e.target.value = "";

    if (selectedFiles.length === 1) {
        alert("Photo 1 saved. Now take Photo 2.");
    }

    if (selectedFiles.length === 2) {
        alert("2 photos ready. You can now upload.");
    }
});

async function uploadPhotos() {
    if (selectedFiles.length !== 2) {
        alert("Please capture 2 photos first (exactly 2 required)");
        return;
    }

    document.getElementById("result").innerHTML =
        <div class="card saving">
            <div class="spinner"></div>
            <div class="saving-text">Uploading photos...</div>
        </div>
    ;

    try {
        const base64_1 = await fileToBase64(selectedFiles[0]);
        const base64_2 = await fileToBase64(selectedFiles[1]);

        const formData = new URLSearchParams();
        formData.append("action", "uploadPhotos");
        formData.append("siNo", document.getElementById("siNo").value);
        formData.append("photo1", base64_1);
        formData.append("photo2", base64_2);

        const res = await fetch(API_URL, {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (data.status === "OK") {
          lastUploadedPhotos = [data.link1, data.link2];
            selectedFiles = [];
            document.getElementById("photoPreview").innerHTML = "";

            document.getElementById("result").innerHTML =
                <div class="card green">
                    ✅ Upload successful<br><br>
                    <a href="${data.link1}" target="_blank">Photo 1</a><br>
                    <a href="${data.link2}" target="_blank">Photo 2</a>
                </div>
            ;
        } else {
            document.getElementById("result").innerHTML =
                <div class="card red">
                    ❌ ${data.status}
                </div>
            ;
        }
    } catch (err) {
        document.getElementById("result").innerHTML =
            <div class="card red">
                ❌ Upload error
            </div>
        ;
    }
}

</script>

</body>
</html>
