<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 15px;
    background: #f4f6f8;
}

#reader {
    width: 100%;
    max-width: 350px;
    margin: auto;
    border-radius: 12px;
    overflow: hidden;
}

input {
    padding: 12px;
    width: 85%;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 14px;
    width: 90%;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
}

.btn-blue {
    background: linear-gradient(135deg, #2196f3, #1976d2);
    color: white;
}

.btn-orange {
    background: linear-gradient(135deg, #ff9800, #ff5722);
    color: white;
}

.card {
    padding: 14px;
    border-radius: 12px;
    margin-top: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.green { background: #d4f8d4; border: 2px solid green; }
.red { background: #ffd6d6; border: 2px solid red; }

#result, #searchResult {
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>📦 SCAN ITEM SYSTEM</h2>

<div id="reader"></div>

<input id="siNo" placeholder="Enter SI No">

<button class="btn-blue" onclick="startScan()">📷 START SCAN</button>
<button class="btn-blue" onclick="searchSI()">🔍 SEARCH SI</button>
<button class="btn-orange" onclick="refreshPage()">♻ REFRESH</button>

<p id="result">Ready</p>
<div id="searchResult"></div>

<script>

let scanner = null;
let isScanning = false;

let tempCode = "";
let tempSi = "";

// ================= AUDIO FIX =================
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function beep() {
    initAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 900;
    gain.gain.value = 0.15;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
}

function vibrate() {
    if (navigator.vibrate) navigator.vibrate([150, 80, 150]);
}

document.addEventListener("click", initAudio, { once: true });

const API_URL = "https://script.google.com/macros/s/AKfycbw5umJYcCkRDJQbNY4DcvpxBb9WRfXsxaH5icrkI0AsZwN1njqVNFVxBevUjRit0mX3GA/exec";

// ================= SCAN =================
async function startScan() {

    const siNo = document.getElementById("siNo").value;

    if (!siNo) {
        document.getElementById("result").innerHTML = "⚠ Enter SI No";
        return;
    }

    if (scanner) {
        try { await scanner.stop(); await scanner.clear(); } catch(e){}
        scanner = null;
    }

    const devices = await Html5Qrcode.getCameras();

    // FORCE BACK CAMERA
    let cameraId = null;

    for (let i = 0; i < devices.length; i++) {
        const label = (devices[i].label || "").toLowerCase();
        if (label.includes("back") || label.includes("rear") || label.includes("environment")) {
            cameraId = devices[i].id;
            break;
        }
    }

    // fallback
    if (!cameraId) cameraId = devices[0].id;

    scanner = new Html5Qrcode("reader");

    await scanner.start(
        cameraId,
        { fps: 10, qrbox: 250 },
        async (code) => {

            if (isScanning) return;
            isScanning = true;

            try {
                await scanner.stop();
                await scanner.clear();
            } catch(e){}

            scanner = null;

            // 🔊 SOUND + VIBRATION
            beep();
            vibrate();

            tempCode = code;
            tempSi = siNo;

            const res = await fetch(API_URL +
                "?action=check&barcode=" + encodeURIComponent(code) +
                "&siNo=" + encodeURIComponent(siNo));

            const data = await res.json();

            let row = data.row || [];

            let colJ = row[9] || "";
            let colO = row[14] || "";

            let details =
                (colJ ? `<b>Lens:</b> ${colJ}<br>` : "") +
                `<b>Description:</b> ${colO}`;

            if (data.status === "FOUND") {

                document.getElementById("result").innerHTML = `
                    <div class="card green">
                        ✅ AVAILABLE<br><br>
                        ${details}<br><br>

                        <button onclick="saveYes()" style="background:green;color:white;">
                            ADD TO SOLD?
                        </button>

                        <button onclick="cancelNo()" style="background:red;color:white;">
                            NO
                        </button>
                    </div>
                `;
            }

            else if (data.status === "DUPLICATE") {

                document.getElementById("result").innerHTML = `
                    <div class="card red">
                        ⚠ ALREADY SOLD<br><br>
                        ${details}<br>
                        <button onclick="cancelNo()">OK</button>
                    </div>
                `;
            }

            else {
                document.getElementById("result").innerHTML = "❌ NOT FOUND";
            }

            isScanning = false;
        }
    );
}

// ================= SAVE =================
async function saveYes() {

    const res = await fetch(API_URL +
        "?action=save" +
        "&barcode=" + encodeURIComponent(tempCode) +
        "&siNo=" + encodeURIComponent(tempSi));

    const data = await res.json();

    document.getElementById("result").innerHTML = `
        <div class="card green">
            ✅ SOLD SAVED<br>
            Status: ${data.status}
        </div>
    `;
}

// ================= SEARCH =================
async function searchSI() {

    const siNo = document.getElementById("siNo").value;

    const res = await fetch(API_URL +
        "?action=searchSI&siNo=" + encodeURIComponent(siNo));

    const data = await res.json();

    const out = document.getElementById("searchResult");

    if (!data.items || data.items.length === 0) {
        out.innerHTML = "No results";
        return;
    }

    out.innerHTML = data.items.map((i, index) => `
        <div class="card">
            #${index + 1}<br>
            <b>Lens:</b> ${i.colJ}<br>
            <b>Description:</b> ${i.colO}<br>
            ${i.barcode}
        </div>
    `).join("");
}

// ================= CANCEL =================
function cancelNo() {
    document.getElementById("result").innerHTML = "❌ CANCELLED";
}

// ================= REFRESH =================
function refreshPage() {

    document.getElementById("siNo").value = "";
    document.getElementById("result").innerHTML = "Ready";
    document.getElementById("searchResult").innerHTML = "";

    if (scanner) {
        scanner.stop();
        scanner.clear();
        scanner = null;
    }
}

</script>

</body>
</html>
