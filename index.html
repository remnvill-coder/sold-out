<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 15px;
    background: #f4f6f8;
}

#reader {
    width: 100%;
    max-width: 350px;
    margin: auto;
}

button {
    padding: 14px;
    width: 90%;
    margin-top: 10px;
    background: #1976d2;
    color: white;
    border: none;
    border-radius: 8px;
}

#result, #searchResult {
    margin-top: 15px;
    font-weight: bold;
}

.card {
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
}

.green { background: #d4f8d4; border: 2px solid green; }

.red { background: #ffd6d6; border: 2px solid red; }
</style>
</head>

<body>

<h2>SCAN ITEM QR</h2>

<div id="reader"></div>

<input id="siNo" placeholder="Enter SI No"
style="padding:12px;width:85%;">

<button onclick="startScan()">START SCAN</button>
<button onclick="searchSI()">SEARCH SI</button>
<button onclick="refreshPage()" style="background:#ff9800;">REFRESH</button>

<p id="result">Ready</p>
<div id="searchResult"></div>

<!-- 🔊 BEEP SOUND -->
<audio id="beepSound"
src="https://www.soundjay.com/button/beep-07.wav"
preload="auto"></audio>

<script>

let scanner = null;
let isScanning = false;

const API_URL = "https://script.google.com/macros/s/AKfycbzjgBdfyMyF08wwqIWYcHzHCqr_3NtYUeogLTOCX1q3TZ7sHemkizMFyXUJC5GCI-FABQ/exec";

function getResult() {
    return document.getElementById("result");
}

// ================= BEEP =================
function playBeep() {
    const beep = document.getElementById("beepSound");
    beep.currentTime = 0;
    beep.play();
}

// ================= VIBRATION =================
function vibrateDevice() {
    if (navigator.vibrate) {
        navigator.vibrate(200);
    }
}


// ================= START SCAN =================
async function startScan() {

    const siNo = document.getElementById("siNo").value.trim();
    const result = getResult();

    if (!siNo) {
        result.innerHTML = "⚠ Enter SI No";
        return;
    }

    if (scanner) {
        try {
            await scanner.stop();
            await scanner.clear();
        } catch (e) {}
        scanner = null;
    }

    const devices = await Html5Qrcode.getCameras();
    const cameraId = devices[devices.length - 1].id;

    scanner = new Html5Qrcode("reader");

    await scanner.start(
        cameraId,
        { fps: 10, qrbox: 250 },

        async (code) => {

            if (isScanning) return;
            isScanning = true;

            await scanner.stop();
            await scanner.clear();
            scanner = null;

            playBeep();        // 🔊 SOUND
            vibrateDevice();   // 📳 VIBRATION

            const safeCode = encodeURIComponent(code);
            const safeSi = encodeURIComponent(siNo);

            const res = await fetch(API_URL + "?barcode=" + safeCode + "&siNo=" + safeSi);
            const data = await res.json();

            let lens = data.colJ || "";
            let desc = data.colO || "";

            let details = lens
                ? `<b>Lens:</b> ${lens}<br><b>Description:</b> ${desc}`
                : `<b>Description:</b> ${desc}`;

            // ================= FOUND =================
            if (data.status === "FOUND") {

                result.innerHTML = `
                    <div class="card green">
                        ✅ FOUND<br><br>
                        ${details}<br><br>
                        <button id="yesBtn"
                            onclick="confirmSave('${safeCode}','${safeSi}',true)">
                            YES
                        </button>
                        <button onclick="confirmSave('${safeCode}','${safeSi}',false)"
                            style="background:red;">
                            NO
                        </button>
                    </div>
                `;

                // 🔥 AUTO FOCUS YES BUTTON
                setTimeout(() => {
                    document.getElementById("yesBtn").focus();
                }, 100);

            }

            // ================= DUPLICATE =================
            else if (data.status === "DUPLICATE") {

                result.innerHTML = `
                    <div class="card red">
                        ⚠ DUPLICATE<br><br>
                        ${details}<br><br>
                        <button onclick="confirmSave('${safeCode}','${safeSi}',false)">
                            OK
                        </button>
                    </div>
                `;
            }

            // ================= NOT FOUND =================
            else {
                result.innerHTML = "❌ NOT FOUND";
            }

            isScanning = false;
        }
    );
}


// ================= CONFIRM SAVE =================
async function confirmSave(code, siNo, ok) {

    const result = getResult();

    if (!ok) {
        result.innerHTML = "❌ CANCELLED";
        return;
    }

    const res = await fetch(API_URL + "?barcode=" + code + "&siNo=" + siNo);
    const data = await res.json();

    let lens = data.colJ || "";
    let desc = data.colO || "";

    let details = lens
        ? `Lens: ${lens}<br>Description: ${desc}`
        : `Description: ${desc}`;

    let time = data.timestamp
        ? new Date(data.timestamp).toLocaleString()
        : "";

    result.innerHTML = `
        <div class="card green">
            ✅ SAVED<br><br>
            ${details}<br><br>
            ${time}
        </div>
    `;
}


// ================= SEARCH =================
async function searchSI() {

    const siNo = document.getElementById("siNo").value;
    const out = document.getElementById("searchResult");

    const res = await fetch(API_URL + "?action=searchSI&siNo=" + siNo);
    const data = await res.json();

    if (!data.items.length) {
        out.innerHTML = "No results";
        return;
    }

    let html = "";

    data.items.forEach((i, index) => {

        html += `<div style="border:1px solid #ccc;margin:5px;padding:8px;">
        #${index+1}<br>
        ${i.lens ? "Lens: " + i.lens + "<br>" : ""}
        ${i.grade}<br>
        ${i.barcode}
        </div>`;
    });

    out.innerHTML = html;
}


// ================= REFRESH =================
function refreshPage() {
    document.getElementById("siNo").value = "";
    document.getElementById("result").innerHTML = "Ready";
    document.getElementById("searchResult").innerHTML = "";

    if (scanner) {
        scanner.stop();
        scanner.clear();
        scanner = null;
    }
}

</script>

</body>
</html>
